<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="page-container">
        <div class="left-panel">
            <div class="logo-container">
                <img src="assets/banner.png" alt="United International University Full Logo" class="large-logo">
            </div>
        </div>
        
        <div class="right-content">
            <div class="login-box">
                <img src="assets/logo.png" alt="UIU Crest Logo" class="small-logo">
                <div class="scheduler-text">UIU Advisor Scheduler</div>
                <div class="welcome-text">Welcome to the Portal</div>
                
                <div class="form-wrapper">
                    <input type="email" placeholder="Enter Email" class="input-field">
                    <input type="password" placeholder="Enter Password" class="input-field">
                    
                    <a href="student-module/student-dashboard.html" class="login-button" style="text-decoration: none;">
                        <span>Login</span>
                    </a>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
